<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Cleanup Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  /* Google Fonts Import */
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-gradient: radial-gradient(circle at top, #fafafc 0%, #ebebef 100%);
    --surface-raw: 255, 255, 255;
    --surface: rgba(var(--surface-raw), 0.75);
    --surface-solid: #ffffff;
    --surface2: rgba(0, 0, 0, 0.04);
    --border: rgba(0, 0, 0, 0.06);
    --border2: rgba(0, 0, 0, 0.12);
    --text: #1d1d1f;
    --text2: #6e6e73;
    --text3: #aeaeb2;
    --accent: #0071e3;
    --danger: #ff453a;
    --success: #34c759;
    --warning-bg: rgba(245, 158, 11, 0.15);
    --warning-text: #b45309;
    --warning-border: #f59e0b;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
    --shadow-hover: 0 20px 50px -10px rgba(0, 0, 0, 0.12);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-gradient: radial-gradient(circle at top, #1c1c1e 0%, #0a0a0c 100%);
      --surface-raw: 30, 30, 32;
      --surface: rgba(var(--surface-raw), 0.75);
      --surface-solid: #1e1e20;
      --surface2: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #f5f5f7;
      --text2: #98989d;
      --text3: #636366;
      --warning-bg: rgba(245, 158, 11, 0.18);
      --warning-text: #fbbf24;
      --warning-border: #d97706;
      --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 20px 50px -10px rgba(0, 0, 0, 0.6);
    }
  }

  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px 100px;
  }

  /* Glassmorphism utility */
  .glass {
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .header-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1e1e3f, #0f0f1b);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  .header-icon i { color: #00bcd4; font-size: 26px; }
  .header-text h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .header-text p { font-size: 14px; color: var(--text2); margin-top: 3px; }
  .header-actions { margin-left: auto; display: flex; gap: 10px; }
  
  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 18px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface-solid);
    color: var(--text);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: inherit;
  }
  .btn:hover { background: var(--surface2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.45; cursor: default; transform: none !important; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #005bb7);
    color: #fff;
    border: none;
    box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #0080ff, var(--accent));
    box-shadow: 0 6px 16px rgba(0, 113, 227, 0.3);
  }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #d92d20);
    color: #fff;
    border: none;
    box-shadow: 0 4px 12px rgba(255, 69, 58, 0.2);
  }
  .btn-danger:hover {
    background: linear-gradient(135deg, #ff6961, var(--danger));
    box-shadow: 0 6px 16px rgba(255, 69, 58, 0.3);
  }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .metric {
    border-radius: var(--radius-lg);
    padding: 18px;
    transition: transform 0.2s;
  }
  .metric:hover {
    transform: translateY(-2px);
  }
  .metric-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .metric-value.red { color: var(--danger); }
  .metric-value.green { color: var(--success); }
  .metric-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Progress */
  .progress-wrap {
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 24px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .progress-label { font-size: 14px; color: var(--text2); font-weight: 500; }
  .progress-pct { font-size: 14px; font-weight: 600; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 6px; background: linear-gradient(90deg, var(--accent), #00bcd4); border-radius: 3px; width: 0%; transition: width 0.25s ease; }

  /* Warning banner */
  .warning-banner {
    display: none;
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--warning-text);
    display: flex; align-items: flex-start; gap: 12px;
    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.08);
  }
  .warning-banner.hidden { display: none; }
  .warning-banner i { margin-top: 2px; flex-shrink: 0; font-size: 16px; }

  /* Category list */
  .list-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .list-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; flex: 1; }
  .list-select-all {
    font-size: 14px; color: var(--accent); background: none; border: none;
    cursor: pointer; font-family: inherit; font-weight: 600; padding: 0;
    transition: opacity 0.15s;
  }
  .list-select-all:hover { opacity: 0.8; }

  .items-list {
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .item-group {
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .item-group:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--border2);
  }
  
  .item-group.expanded {
    border-color: var(--border2);
    box-shadow: var(--shadow-hover);
  }

  .item-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    transition: background 0.15s;
    cursor: pointer;
    user-select: none;
  }
  .item-row:hover { background: var(--surface2); }
  .item-row.selected { background: rgba(0, 113, 227, 0.06); }

  .item-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }
  .item-check.checked { background: var(--accent); border-color: var(--accent); }
  .item-check.checked i { color: white; font-size: 12px; display: block; }
  .item-check:not(.checked) i { display: none; }

  .item-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 16px; font-weight: 600; }
  .item-desc { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .item-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .size-bar-wrap { width: 80px; height: 6px; background: var(--surface2); border-radius: 3px; }
  .size-bar { height: 6px; border-radius: 3px; }
  .item-size { font-size: 14px; font-weight: 600; min-width: 70px; text-align: right; }
  .warn-icon { color: var(--warning-border); font-size: 15px; }
  
  .expand-caret {
    font-size: 12px;
    color: var(--text3);
    transition: transform 0.2s ease;
    width: 16px;
    display: flex;
    justify-content: center;
  }
  
  .item-group.expanded .expand-caret {
    transform: rotate(90deg);
  }

  /* Expanded detail drawer */
  .item-details {
    border-top: 1px solid var(--border);
    background: rgba(var(--surface-raw), 0.35);
    display: none;
    overflow: hidden;
  }
  
  .details-inner {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .details-paths {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .paths-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .path-chips-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  
  .path-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  
  .path-chip:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .files-list-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  .files-list {
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface-solid);
  }

  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background 0.1s;
  }
  
  .file-row:last-child {
    border-bottom: none;
  }
  
  .file-row:hover {
    background: var(--surface2);
  }
  
  .file-icon-wrap {
    font-size: 14px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  
  .file-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  
  .file-size {
    font-weight: 600;
    color: var(--text2);
    margin-right: 12px;
    font-variant-numeric: tabular-nums;
  }
  
  .file-actions {
    display: flex;
    gap: 6px;
  }
  
  .file-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    transition: all 0.15s;
  }
  
  .file-btn:hover {
    background: var(--surface2);
    color: var(--text);
  }
  
  .file-btn-danger:hover {
    background: rgba(255, 69, 58, 0.1);
    color: var(--danger);
  }

  .text-accent { color: var(--accent); }
  .text-primary { color: #2196f3; }
  .text-success { color: var(--success); }
  .text-warning { color: var(--warning-border); }
  .text-danger { color: var(--danger); }
  .text-muted { color: var(--text3); }

  /* Custom Scrollbar for Files List */
  .files-list::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .files-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .files-list::-webkit-scrollbar-thumb {
    background: var(--border2);
    border-radius: 3px;
  }
  .files-list::-webkit-scrollbar-thumb:hover {
    background: var(--text3);
  }

  /* Skeleton loading state */
  .details-loading {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  @keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  
  .skeleton-line {
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border2) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
  }

  .details-empty {
    padding: 30px;
    text-align: center;
    color: var(--text3);
  }
  .details-empty i {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }
  .details-empty p {
    font-size: 13px;
  }

  /* Footer toolbar */
  .toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    z-index: 100;
  }
  .toolbar-inner { max-width: 800px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 16px; }
  .toolbar-info { flex: 1; font-size: 14px; color: var(--text2); }
  .toolbar-info strong { color: var(--text); }

  /* Empty / loading states */
  .state-box {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .state-box i { font-size: 44px; margin-bottom: 16px; display: block; color: var(--text3); }
  .state-box p { font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: rgba(26, 26, 46, 0.95); color: white;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 12px 24px; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; white-space: nowrap;
    opacity: 0; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -4px); }

  /* Confirm modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface-solid);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 420px; width: 90%;
    box-shadow: 0 30px 70px rgba(0,0,0,0.35);
    border: 1px solid var(--border);
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .modal p { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
  .modal ul { margin: 12px 0 20px 20px; font-size: 13px; color: var(--text2); line-height: 1.8; max-height: 150px; overflow-y: auto; }

  .spinner { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-icon"><i class="fa-solid fa-laptop"></i></div>
    <div class="header-text">
      <h1>MacBook Cleanup Manager</h1>
      <p id="disk-info">Ready to scan</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="scan-btn" onclick="runScan()">
        <i class="fa-solid fa-magnifying-glass"></i> Scan Disk
      </button>
    </div>
  </div>

  <div class="summary">
    <div class="metric glass">
      <div class="metric-label">Total disk</div>
      <div class="metric-value" id="total-disk">—</div>
      <div class="metric-sub" id="disk-sub">—</div>
    </div>
    <div class="metric glass">
      <div class="metric-label">Reclaimable</div>
      <div class="metric-value red" id="reclaimable">—</div>
      <div class="metric-sub">across categories</div>
    </div>
    <div class="metric glass">
      <div class="metric-label">Recovered</div>
      <div class="metric-value green" id="recovered">0 B</div>
      <div class="metric-sub">this session</div>
    </div>
  </div>

  <div class="progress-wrap glass" id="progress-wrap">
    <div class="progress-header">
      <span class="progress-label" id="progress-label">Scanning…</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div id="warning-banner" class="warning-banner">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <span id="warning-text"></span>
  </div>

  <div class="list-header">
    <span class="list-title">Storage categories</span>
    <button class="list-select-all" id="select-all-btn" onclick="toggleSelectAll()">Select all</button>
  </div>

  <div class="items-list" id="items-list">
    <div class="state-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>Click <strong>Scan Disk</strong> to analyze storage</p>
    </div>
  </div>

</div>

<!-- Sticky toolbar -->
<div class="toolbar glass">
  <div class="toolbar-inner">
    <span class="toolbar-info" id="toolbar-info">Nothing selected</span>
    <button class="btn btn-danger" id="clean-btn" disabled onclick="confirmClean()">
      <i class="fa-solid fa-trash"></i> Clean Selected
    </button>
  </div>
</div>

<!-- Reusable Confirm Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2>Confirm Action</h2>
    <p id="modal-body">Are you sure?</p>
    <ul id="modal-list"></ul>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="confirm-btn">
        <i class="fa-solid fa-trash"></i> Delete Permanently
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let recoveredBytes = 0;
let allSelected = false;

const ICON_MAP = {
  'brand-docker': 'fa-brands fa-docker',
  'brain': 'fa-solid fa-brain',
  'hammer': 'fa-solid fa-hammer',
  'server': 'fa-solid fa-server',
  'server-2': 'fa-solid fa-server',
  'download': 'fa-solid fa-download',
  'archive': 'fa-solid fa-box-archive',
  'brand-vscode': 'fa-solid fa-code',
  'sparkles': 'fa-solid fa-wand-sparkles',
  'apps': 'fa-solid fa-border-all',
  'trash': 'fa-solid fa-trash',
  'file-off': 'fa-solid fa-file-circle-xmark',
};

const ICON_COLORS = {
  'brand-docker': { bg: '#e3f2fd', color: '#1565c0' },
  'brain':        { bg: '#f3e5f5', color: '#6a1b9a' },
  'hammer':       { bg: '#fff3e0', color: '#e65100' },
  'server':       { bg: '#e8f5e9', color: '#2e7d32' },
  'server-2':     { bg: '#fce4ec', color: '#880e4f' },
  'download':     { bg: '#e0f7fa', color: '#006064' },
  'archive':      { bg: '#fffde7', color: '#827717' },
  'brand-vscode': { bg: '#e3f2fd', color: '#0277bd' },
  'sparkles':     { bg: '#e8eaf6', color: '#283593' },
  'apps':         { bg: '#fbe9e7', color: '#bf360c' },
  'trash':        { bg: '#efebe9', color: '#4e342e' },
  'file-off':     { bg: '#f5f5f5', color: '#546e7a' },
};

function fmtBytes(b) {
  if (b === 0) return '0 B';
  const gb = b / 1e9;
  const mb = b / 1e6;
  if (gb >= 1) return gb.toFixed(1) + ' GB';
  if (mb >= 1) return Math.round(mb) + ' MB';
  return Math.round(b / 1024) + ' KB';
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function selectedItems() { return items.filter(i => i.checked); }
function selectedBytes() { return selectedItems().reduce((s, i) => s + i.size, 0); }
function totalReclaimable() { return items.reduce((s, i) => s + i.size, 0); }

function updateToolbar() {
  const sel = selectedItems();
  const info = document.getElementById('toolbar-info');
  const btn = document.getElementById('clean-btn');
  if (sel.length === 0) {
    info.innerHTML = 'Nothing selected';
    btn.disabled = true;
  } else {
    info.innerHTML = `<strong>${sel.length}</strong> item${sel.length > 1 ? 's' : ''} selected &mdash; ${fmtBytes(selectedBytes())} to free`;
    btn.disabled = false;
  }

  // Show warnings
  const warns = sel.filter(i => i.warning).map(i => i.warning);
  const banner = document.getElementById('warning-banner');
  if (warns.length) {
    document.getElementById('warning-text').textContent = warns[0];
    banner.classList.remove('hidden');
    banner.style.display = 'flex';
  } else {
    banner.classList.add('hidden');
    banner.style.display = 'none';
  }
}

function renderList() {
  const maxSize = Math.max(...items.map(i => i.size), 1);
  const container = document.getElementById('items-list');
  container.innerHTML = '';

  if (!items.length) {
    container.innerHTML = '<div class="state-box"><i class="fa-solid fa-check-circle" style="color:var(--success)"></i><p>Nothing left to clean!</p></div>';
    updateToolbar();
    return;
  }

  items.forEach(item => {
    const pct = Math.round((item.size / maxSize) * 100);
    const barColor = item.size > 5e9 ? 'var(--danger)' : item.size > 1e9 ? '#f59e0b' : 'var(--accent)';
    const iconCls = ICON_MAP[item.icon] || 'fa-solid fa-folder';
    const colors = ICON_COLORS[item.icon] || { bg: 'var(--surface2)', color: 'var(--text2)' };

    // Group container
    const groupEl = document.createElement('div');
    groupEl.className = `item-group ${item.expanded ? 'expanded' : ''}`;
    groupEl.id = `group-${item.id}`;

    // Header row
    const rowEl = document.createElement('div');
    rowEl.className = 'item-row' + (item.checked ? ' selected' : '');
    
    // Checkbox click handler
    const checkClickHtml = `toggleItem('${item.id}', event)`;
    
    // Main click handler (triggers expand)
    rowEl.onclick = (e) => {
      // If clicked on checkbox or action buttons inside row, don't toggle expand
      if (e.target.closest('.item-check') || e.target.closest('.file-btn')) return;
      toggleExpand(item.id, e);
    };

    rowEl.innerHTML = `
      <div class="item-check ${item.checked ? 'checked' : ''}" onclick="${checkClickHtml}">
        <i class="fa-solid fa-check"></i>
      </div>
      <div class="item-icon" style="background:${colors.bg}">
        <i class="${iconCls}" style="color:${colors.color}"></i>
      </div>
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
      </div>
      <div class="item-right">
        ${item.warning ? '<i class="fa-solid fa-triangle-exclamation warn-icon" title="' + item.warning + '"></i>' : ''}
        <div class="size-bar-wrap"><div class="size-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="item-size">${fmtBytes(item.size)}</div>
        <div class="expand-caret"><i class="fa-solid fa-chevron-right"></i></div>
      </div>`;
    
    // Details block
    const detailsEl = document.createElement('div');
    detailsEl.className = 'item-details';
    detailsEl.id = `details-${item.id}`;
    detailsEl.style.display = item.expanded ? 'block' : 'none';

    groupEl.appendChild(rowEl);
    groupEl.appendChild(detailsEl);
    container.appendChild(groupEl);

    // If already expanded, render details content
    if (item.expanded) {
      renderCategoryDetails(item);
    }
  });
  updateToolbar();
}

function toggleItem(id, event) {
  if (event) event.stopPropagation();
  const item = items.find(i => i.id === id);
  if (item) { item.checked = !item.checked; renderList(); }
}

function toggleSelectAll() {
  allSelected = !allSelected;
  items.forEach(i => i.checked = allSelected);
  document.getElementById('select-all-btn').textContent = allSelected ? 'Deselect all' : 'Select all';
  renderList();
}

async function toggleExpand(id, event) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  item.expanded = !item.expanded;
  
  // Re-render the list to update classes and carets
  renderList();
  
  if (item.expanded) {
    if (!item.files && !item.loadingFiles) {
      item.loadingFiles = true;
      renderCategoryDetails(item);
      
      try {
        const res = await fetch(`/api/category-files/${id}`);
        const data = await res.json();
        item.files = data.files || [];
        item.root_paths = data.root_paths || [];
      } catch (e) {
        console.error("Failed to load subfiles", e);
        item.files = [];
        item.root_paths = [];
        showToast("Failed to load detailed file list.");
      } finally {
        item.loadingFiles = false;
        renderCategoryDetails(item);
      }
    }
  }
}

function renderCategoryDetails(item) {
  const detailsEl = document.getElementById(`details-${item.id}`);
  if (!detailsEl) return;

  if (item.loadingFiles) {
    detailsEl.innerHTML = `
      <div class="details-loading">
        <div class="skeleton-line" style="width: 80%"></div>
        <div class="skeleton-line" style="width: 95%"></div>
        <div class="skeleton-line" style="width: 70%"></div>
      </div>`;
    return;
  }

  // Build the locations path section
  let pathsHtml = '';
  if (item.root_paths && item.root_paths.length > 0) {
    pathsHtml = `
      <div class="details-paths">
        <span class="paths-label">Folder locations:</span>
        <div class="path-chips-container">
          ${item.root_paths.map(path => {
            // Shorten display path for display cleanliness (replace user home directory)
            const displayPath = path.replace(/\/Users\/[^\/]+/, '~');
            return `
              <span class="path-chip" onclick="openPath('${escapeHtml(path)}', event)" title="Open this folder in Finder">
                <i class="fa-solid fa-folder-open"></i> ${displayPath}
              </span>
            `;
          }).join('')}
        </div>
      </div>`;
  }

  // Build sub-files section
  let filesHtml = '';
  if (item.files && item.files.length > 0) {
    filesHtml = `
      <div class="files-list-title">Detailed contents (sorted by size)</div>
      <div class="files-list">
        ${item.files.map(file => {
          const isDir = file.is_dir;
          const isDocker = file.type && file.type.startsWith("docker_");
          
          let fileIcon = '<i class="fa-solid fa-file text-muted"></i>';
          if (isDir) {
            fileIcon = '<i class="fa-solid fa-folder text-accent"></i>';
          } else if (file.type === "docker_image") {
            fileIcon = '<i class="fa-brands fa-docker text-primary"></i>';
          } else if (file.type === "docker_container") {
            fileIcon = '<i class="fa-solid fa-cube text-success"></i>';
          } else {
            // Infer file type from extension
            const ext = file.name.split('.').pop().toLowerCase();
            if (['zip', 'tar', 'gz', 'dmg', 'pkg', 'rar'].includes(ext)) {
              fileIcon = '<i class="fa-solid fa-file-zipper text-warning"></i>';
            } else if (['app'].includes(ext)) {
              fileIcon = '<i class="fa-solid fa-window-maximize text-accent"></i>';
            } else if (['log', 'txt', 'md', 'json'].includes(ext)) {
              fileIcon = '<i class="fa-solid fa-file-lines text-muted"></i>';
            } else if (['mp4', 'mkv', 'mov', 'avi'].includes(ext)) {
              fileIcon = '<i class="fa-solid fa-file-video text-danger"></i>';
            } else if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) {
              fileIcon = '<i class="fa-solid fa-file-image text-success"></i>';
            }
          }

          // Render actions
          const showOpen = !isDocker && file.path;
          
          return `
            <div class="file-row">
              <span class="file-icon-wrap">${fileIcon}</span>
              <span class="file-name" title="${escapeHtml(file.path || '')}">${escapeHtml(file.name)}</span>
              <span class="file-size">${fmtBytes(file.size)}</span>
              <div class="file-actions">
                ${showOpen ? `
                  <button class="file-btn" onclick="openPath('${escapeHtml(file.path)}', event)" title="Reveal in Finder">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                  </button>
                ` : ''}
                <button class="file-btn file-btn-danger" onclick="deletePath('${escapeHtml(file.path)}', '${escapeHtml(file.name)}', '${item.id}', event)" title="Delete permanently">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </div>
          `;
        }).join('')}
      </div>`;
  } else {
    filesHtml = `
      <div class="details-empty">
        <i class="fa-solid fa-folder-open"></i>
        <p>No subfolders or large files found in this category.</p>
      </div>`;
  }

  detailsEl.innerHTML = `
    <div class="details-inner">
      ${pathsHtml}
      ${filesHtml}
    </div>`;
}

async function openPath(path, event) {
  if (event) event.stopPropagation();
  try {
    const res = await fetch('/api/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('Opened in Finder');
    } else {
      showToast(`Could not open: ${data.error}`);
    }
  } catch (e) {
    showToast('Failed to contact server.');
  }
}

function confirmAction(title, body, onConfirm) {
  const modal = document.getElementById('modal-backdrop');
  const modalTitle = modal.querySelector('h2');
  const modalBody = document.getElementById('modal-body');
  const modalList = document.getElementById('modal-list');
  const confirmBtn = document.getElementById('confirm-btn');
  
  modalTitle.textContent = title;
  modalBody.textContent = body;
  modalList.innerHTML = ''; // clear list
  
  confirmBtn.onclick = () => {
    closeModal();
    onConfirm();
  };
  
  modal.classList.add('open');
}

function deletePath(path, name, categoryId, event) {
  if (event) event.stopPropagation();
  confirmAction(
    'Delete Permanently?',
    `Are you sure you want to delete "${name}"? This cannot be undone.`,
    async () => {
      try {
        const res = await fetch('/api/delete-path', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const data = await res.json();
        if (data.success) {
          showToast(`Deleted "${name}"`);
          
          // Update category size in UI
          const item = items.find(i => i.id === categoryId);
          if (item) {
            const freed = data.size_freed || 0;
            
            // Subtract size from category
            if (freed > 0) {
              item.size = Math.max(0, item.size - freed);
              recoveredBytes += freed;
            }
            
            // Update sub-files array
            if (item.files) {
              const fileIdx = item.files.findIndex(f => f.path === path);
              if (fileIdx > -1) {
                const fSize = item.files[fileIdx].size;
                item.files.splice(fileIdx, 1);
                
                // For Docker or cases where size_freed isn't explicitly returned
                if (freed === 0) {
                  item.size = Math.max(0, item.size - fSize);
                  recoveredBytes += fSize;
                }
              }
            }
            
            // Refresh stats & list
            document.getElementById('recovered').textContent = fmtBytes(recoveredBytes);
            document.getElementById('reclaimable').textContent = fmtBytes(totalReclaimable());
            renderList();
          }
        } else {
          showToast(`Failed to delete: ${data.error}`);
        }
      } catch (e) {
        showToast('Delete request failed.');
      }
    }
  );
}

function animateProgress(label, fake = true) {
  const wrap = document.getElementById('progress-wrap');
  const fill = document.getElementById('progress-fill');
  const lbl = document.getElementById('progress-label');
  const pct = document.getElementById('progress-pct');
  wrap.classList.add('visible');
  lbl.textContent = label;
  fill.style.width = '0%'; pct.textContent = '0%';
  if (!fake) return;
  let p = 0;
  return setInterval(() => {
    p = Math.min(p + Math.random() * 8 + 2, 92);
    fill.style.width = Math.round(p) + '%';
    pct.textContent = Math.round(p) + '%';
  }, 120);
}

function finishProgress() {
  const fill = document.getElementById('progress-fill');
  const pct = document.getElementById('progress-pct');
  fill.style.width = '100%'; pct.textContent = '100%';
  setTimeout(() => {
    document.getElementById('progress-wrap').classList.remove('visible');
  }, 400);
}

async function runScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-rotate spinner"></i> Scanning…';
  document.getElementById('items-list').innerHTML = '<div class="state-box"><i class="fa-solid fa-rotate spinner"></i><p>Scanning disk…</p></div>';

  const iv = animateProgress('Scanning storage categories…');
  try {
    const res = await fetch('/api/scan');
    const data = await res.json();
    clearInterval(iv); finishProgress();

    items = data.categories.map(c => ({
      ...c,
      checked: false,
      expanded: false,
      files: null,
      loadingFiles: false,
      root_paths: []
    }));
    allSelected = false;
    document.getElementById('select-all-btn').textContent = 'Select all';

    const total = data.disk_total;
    const free = data.disk_free;
    document.getElementById('total-disk').textContent = fmtBytes(total);
    document.getElementById('disk-sub').textContent = fmtBytes(free) + ' free';
    document.getElementById('disk-info').textContent = 'Last scanned just now';
    document.getElementById('reclaimable').textContent = fmtBytes(totalReclaimable());

    renderList();
  } catch (e) {
    clearInterval(iv); finishProgress();
    showToast('Scan failed — is the server running?');
    document.getElementById('items-list').innerHTML = '<div class="state-box"><i class="fa-solid fa-circle-exclamation" style="color:var(--danger)"></i><p>Scan failed. Make sure the Flask server is running.</p></div>';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-rotate"></i> Rescan Disk';
  }
}

function confirmClean() {
  const sel = selectedItems();
  if (!sel.length) return;
  
  confirmAction(
    'Confirm Cleanup',
    `You are about to permanently delete ${fmtBytes(selectedBytes())} of data. This cannot be undone.`,
    () => doClean()
  );
  
  // Populate the list of items inside the modal
  const list = document.getElementById('modal-list');
  list.innerHTML = sel.map(i => `<li>${i.name} — ${fmtBytes(i.size)}</li>`).join('');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

async function doClean() {
  closeModal();
  const sel = selectedItems();
  const ids = sel.map(i => i.id);
  const btn = document.getElementById('clean-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-rotate spinner"></i> Cleaning…';

  const iv = animateProgress(`Cleaning ${sel.length} item${sel.length > 1 ? 's' : ''}…`);
  try {
    const res = await fetch('/api/clean', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids }),
    });
    const data = await res.json();
    clearInterval(iv); finishProgress();

    recoveredBytes += data.freed_total;
    document.getElementById('recovered').textContent = fmtBytes(recoveredBytes);

    items = items.filter(i => !ids.includes(i.id));
    document.getElementById('reclaimable').textContent = items.length ? fmtBytes(totalReclaimable()) : '0 B';
    allSelected = false;
    document.getElementById('select-all-btn').textContent = 'Select all';
    renderList();
    showToast(`Freed ${fmtBytes(data.freed_total)} of storage.`);
  } catch (e) {
    clearInterval(iv); finishProgress();
    showToast('Cleanup failed — check server logs.');
  } finally {
    btn.innerHTML = '<i class="fa-solid fa-trash"></i> Clean Selected';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
